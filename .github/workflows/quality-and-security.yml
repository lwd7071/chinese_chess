name: Code Quality and Security

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-scan:
    name: Ruff Lint and Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository (Pinned SHA)
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (Linters)
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Lint with Ruff
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          ruff check .

      - name: Security scan with Bandit
        run: |
          # Fail only on Medium and High severity issues, excluding tests and virtual environments
          bandit -r . -x tests/,venv/,.venv/ -ll
