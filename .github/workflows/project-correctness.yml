name: Project Correctness

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  SDL_VIDEODRIVER: dummy
  SDL_AUDIODRIVER: dummy
  PYTHONUNBUFFERED: "1"

jobs:
  correctness:
    name: Compile and run project evals
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install host dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall ai game gui main.py

      - name: Create eval virtual environment
        run: python -m venv venv

      - name: Install eval dependencies
        run: |
          venv/bin/python -m pip install --upgrade pip
          venv/bin/python -m pip install -r requirements.txt

      - name: Verify main entrypoint syntax
        run: venv/bin/python -m py_compile main.py
